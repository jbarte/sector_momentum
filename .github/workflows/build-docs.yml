name: Build Dashboard

# Rebuilds docs/ and deploys it as a Pages artifact whenever dashboard
# source changes on main. docs/ is not committed — see
# design/specs/2026-07-20-pages-artifact-deploy-design.md.

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "src/**"
      - "config/**"
      - "backtests/**"
      - "requirements.lock"
  workflow_dispatch: {}

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write             # deploy the Pages artifact
      id-token: write          # OIDC token for deploy-pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.lock --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Build dashboard
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: python dashboard/build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

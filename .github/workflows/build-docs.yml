name: Build Dashboard

# Rebuilds docs/ on main whenever dashboard source changes, so the published
# dashboard is a CI-owned artifact. Feature branches should NOT commit docs/ —
# that's what caused recurring merge conflicts (the cron and every branch each
# regenerating the same generated tree). See CLAUDE.md → Generated artifacts.

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "src/**"
      - "config/**"
      - "backtests/**"
      - "requirements.lock"
  workflow_dispatch: {}

concurrency:
  group: commit-to-main
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # phase 1 still commits docs/ (rollback path)
      pages: write             # deploy the Pages artifact
      id-token: write          # OIDC token for deploy-pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.lock --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Build dashboard
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: python dashboard/build.py

      - name: Commit rebuilt docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # [skip ci] + the docs/-excluded paths filter both prevent a rebuild loop.
          git diff --staged --quiet || git commit -m "build: rebuild dashboard [skip ci]"
          git pull --rebase origin main
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

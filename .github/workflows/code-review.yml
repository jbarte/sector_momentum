name: Code Review

# Automated Claude code review on pull requests.
# Posts findings as inline PR comments. Does NOT block merge — Jonas merges manually.
#
# Setup required once:
#   1. Install the Claude GitHub App on this repo:  run `claude /install-github-app`
#      (or install from https://github.com/apps/claude).
#   2. Add repo secret ANTHROPIC_API_KEY (Settings → Secrets and variables → Actions).
#
# NOTE: the `anthropics/claude-code-action` input names evolve — if a run fails on an
# unknown input, check the action README: https://github.com/anthropics/claude-code-action

on:
  pull_request:
    types: [opened, synchronize]   # on PR open and on each new push

# Avoid stacking reviews when several pushes land quickly: cancel the in-flight
# review for a PR when a newer commit arrives.
concurrency:
  group: code-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # needed to post review comments
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the diff vs base resolves

      - name: Claude code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "/code-review --comment"
          claude_args: "--model claude-sonnet-4-6 --max-turns 15"

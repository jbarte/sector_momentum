name: Sector Momentum Scan

on:
  schedule:
    - cron: "0 6 */2 * *"   # every 2 days, 06:00 UTC
  workflow_dispatch: {}       # manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit back to repo

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: python scan.py --no-dashboard

      - name: Build dashboard
        run: python dashboard/build.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/momentum.db docs/ reports/
          git diff --staged --quiet || git commit -m "scan: $(date -u +%Y-%m-%d) automated run"
          git push

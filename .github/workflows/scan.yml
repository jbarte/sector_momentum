name: Sector Momentum Scan

on:
  schedule:
    - cron: "0 6 * * *"    # daily, 06:00 UTC
  workflow_dispatch: {}       # manual trigger

concurrency:
  group: commit-to-main
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180      # worst-case GDELT backoff is ~80 min; default 6h is too generous
    permissions:
      contents: write         # needed to commit back to repo

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.lock --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: data/cache
          key: price-cache-${{ github.run_id }}
          restore-keys: |
            price-cache-

      - name: Run tests
        run: pytest tests/ -q

      - name: Run scan
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scan.py --no-dashboard

      - name: Build dashboard
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: python dashboard/build.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "scan: $(date -u +%Y-%m-%d) automated run"
          git pull --rebase origin main
          git push

      - name: Notify scan failure
        if: failure()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s \
              -H "Title: Sector Momentum scan FAILED" \
              -H "Priority: high" \
              -H "Tags: rotating_light" \
              -d "Daily scan failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              "https://ntfy.sh/$NTFY_TOPIC" || true
          fi

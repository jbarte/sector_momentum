# Thematic / genre ETF universe (Phase 1). One ETF per theme.
# benchmark: single global index for relative strength (SPY fallback if absent).
#
# Scoring uses the US-listed ETFs (higher liquidity, longer history).
# ucits: lists the closest EU-domiciled (UCITS) equivalent for EU investors —
# reference instruments only, not used for scoring.
# match: exact = same issuer + same index; close = same theme, different index;
#        partial = best available, meaningfully different exposure.
benchmark: ACWI
themes:
  Artificial Intelligence & Robotics: BOTZ
  Semiconductors: SOXX
  Cybersecurity: CIBR
  Clean Energy: ICLN
  Defense: ITA
  Blockchain & Crypto: BLOK
  Uranium & Nuclear: URA
  Space: UFO
  Lithium & Battery: LIT
  Biotech: XBI

ucits:
  Artificial Intelligence & Robotics:
    - ticker: BOTZ
      name: Global X Robotics & Artificial Intelligence UCITS ETF
      isin: IE00BLCHJB90
      ter: "0.50%"
      issuer: Global X
      match: exact
      url: https://www.justetf.com/en/etf-profile.html?isin=IE00BLCHJB90

  Semiconductors:
    - ticker: VVSM
      name: VanEck Semiconductor UCITS ETF
      isin: IE00BMC38736
      ter: "0.35%"

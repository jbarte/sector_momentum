# Tickers that collide with common English words — skipped as Google Trends
# query terms because their search volume is dominated by non-financial use.
# NOTE: entries are quoted because YAML 1.1 parses bare ON/OFF/YES/NO/Y/N as
# booleans (e.g. `- ON` → True), which would break the blocklist.
- "ALL"
- "KEY"
- "IT"
- "ON"
- "A"
- "SO"
- "DD"
- "NOW"
- "CAT"
- "GAP"

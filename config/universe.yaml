# US sector ETFs (SPDR Select Sector)
us_sectors:
  Technology: XLK
  Financials: XLF
  Energy: XLE
  Health Care: XLV
  Industrials: XLI
  Consumer Discretionary: XLY
  Consumer Staples: XLP
  Utilities: XLU
  Materials: XLB
  Real Estate: XLRE
  Communication Services: XLC

# US benchmark
us_benchmark: RSP  # equal-weight S&P 500 (less mega-cap distorted)
us_benchmark_alt: SPY

# European sector proxies (STOXX Europe 600 sector UCITS ETFs via iShares/Amundi)
# Using Yahoo Finance tickers for iShares STOXX Europe 600 sector ETFs
# Values are lists; single-element = one ETF, multi-element = equal-weight composite.
# Financials: Banks + Financial Services + Insurance (3-component composite)
# Materials: Basic Resources + Chemicals (2-component composite)
eu_sectors:
  Technology: [EXV3.DE]
  Financials: [EXV1.DE, EXH2.DE, EXH5.DE]   # Banks + Financial Services + Insurance
  Energy: [EXH1.DE]
  Health Care: [EXV4.DE]
  Industrials: [EXH4.DE]
  Consumer Discretionary: [EXH7.DE]
  Consumer Staples: [EXH3.DE]
  Utilities: [EXH9.DE]
  Materials: [EXV6.DE, EXV7.DE]             # Basic Resources + Chemicals
  Real Estate: [IPRP.L]
  Communication Services: [EXV2.DE]

# European benchmark
eu_benchmark: EXSA.DE  # iShares STOXX Europe 600 UCITS ETF

# Swedish market context (not used as signal sources)
swedish_context:
  - OMXS30
  - OMXSPI

# Lookback for price history (trading days)
price_lookback_days: 252  # ~1 year

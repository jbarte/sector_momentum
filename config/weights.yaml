# Sentiment uses FinBERT news polarity (ProsusAI/finbert over GDELT headlines).
# The composite score is pure data by default (blend_sentiment=False); the
# dashboard toggle lets the user blend sentiment at a configurable weight.
# Google Trends signals remain info-only on the sentiment page.

# Within data pillar: level vs change split
data_pillar:
  level: 0.50
  change: 0.50

# Signal display ordering for the dashboard breakdown panel.
# The actual equal-weight signal lists are hardcoded in src/scoring.py
# (_LEVEL_SIGNALS, _CHANGE_SIGNALS); these keys control column order in
# dashboard/build.py only. Values are ignored.
level_signals:
  rs_ratio: 1.0
  return_3m: 1.0
  return_6m: 1.0
  above_50dma: 1.0

change_signals:
  rs_momentum: 1.0
  acceleration: 1.0
  ma50_slope: 1.0
  obv_slope: 1.0

# Signal computation parameters
signal_params:
  rs_momentum_fast: 5     # RRG RS-Momentum lookback (was 1; standard RRG ~10)
